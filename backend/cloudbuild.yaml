substitutions:
  _REPO_NAME: "lite-hrms-repo"
  _SERVICE_NAME: "lite-hrms-backend"
  _IMAGE: "lite-hrms-backend-image"
  _REGION: "asia-south1"

steps:
  # Step 1: Create the Artifact Registry repo (if it doesn't exist)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud artifacts repositories describe ${_REPO_NAME} --location=${_REGION} || 
        gcloud artifacts repositories create ${_REPO_NAME} --repository-format=docker --location=${_REGION} --quiet
    id: 'create-repo'

  # Step 2: Configure Docker authentication
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud auth configure-docker ${_REGION}-docker.pkg.dev
    id: 'docker-auth'
    wait_for: ['create-repo']

  # Step 3: Build the Docker image (MODIFIED FOR MONOREPO)
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        'build',
        '--progress=plain',
        '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE}:$COMMIT_SHA',
        '-f', 'backend/Dockerfile',  # Tell Docker WHERE the file is
        'backend'                     # Tell Docker to use the backend folder as context
      ]
    id: 'build'
    wait_for: ['docker-auth']

  # Step 4: Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE}:$COMMIT_SHA'
      ]
    id: 'push'
    wait_for: ['build']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run', 'deploy', '${_SERVICE_NAME}',
        # Ensure we use the exact image we just pushed
        '--image', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE}:$COMMIT_SHA',
        '--platform', 'managed',
        '--region', '${_REGION}',
        '--allow-unauthenticated',
        # ADDED ENV VARS HERE. Note the port change to 6543!
        '--set-env-vars', 'DATABASE_URL=postgresql://postgres:hrms-lite03@db.cwxauwtoaaabphabeydx.supabase.co:6543/postgres,ADMIN_PASSWORD=admin123'
      ]
    id: 'deploy'
    wait_for: ['push']

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
timeout: "900s"